{% extends "base.html" %}

{% block main_class %}site-main--wide{% endblock %}

{% block header_actions %}
  <details class="admin-menu">
    <summary class="admin-menu-trigger">Admin</summary>
    <ul class="admin-menu-list">
      <li><a href="{{ url_for('admin_print_qr') }}">Print QR codes</a></li>
    </ul>
  </details>
{% endblock %}

{% block content %}
  {% if error %}
    <p class="message message-error">{{ error }}</p>
  {% endif %}

  {% if items %}
    <div class="inventory-search">
      <label class="inventory-search-label">
        Search
        <input
          type="search"
          id="filter-q"
          placeholder="Name, brand, model, category…"
          autocomplete="off"
        />
      </label>
    </div>

    <p class="inventory-status" id="inventory-status"></p>

    <div class="inventory-table-wrap">
      <table class="inventory-table">
        <thead>
          <tr>
            <th class="inventory-th inventory-th--item" scope="col">
              <button type="button" class="th-sort" data-sort="display_name">
                Item
                <span class="sort-indicator" aria-hidden="true"></span>
              </button>
            </th>
            <th class="inventory-th inventory-th--category" scope="col">
              <button type="button" class="th-sort" data-sort="category">
                Category
                <span class="sort-indicator" aria-hidden="true"></span>
              </button>
              <select class="th-filter" id="filter-category" aria-label="Filter by category"></select>
            </th>
            <th class="inventory-th inventory-th--location" scope="col">
              <button type="button" class="th-sort" data-sort="location">
                Location
                <span class="sort-indicator" aria-hidden="true"></span>
              </button>
              <select class="th-filter" id="filter-location" aria-label="Filter by location"></select>
            </th>
          </tr>
        </thead>
        <tbody id="inventory-list"></tbody>
      </table>
    </div>

    <script id="inventory-data" type="application/json">{{ items | tojson }}</script>
    <script src="{{ url_for('static', filename='list.js') }}" defer></script>
  {% elif not error %}
    <p class="message">No items in inventory.</p>
  {% endif %}
{% endblock %}
